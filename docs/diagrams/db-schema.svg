<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" width="820" height="480" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="pk-arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="480" fill="#f8fafc" rx="6"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">TechPulse — 데이터베이스 스키마 (Supabase / PostgreSQL)</text>

  <!-- ══════════ analysis_runs ══════════ -->
  <rect x="30" y="50" width="220" height="210" rx="8" fill="white" stroke="#6366f1" stroke-width="2"/>
  <!-- Header -->
  <rect x="30" y="50" width="220" height="34" rx="8" fill="#6366f1"/>
  <rect x="30" y="68"  width="220" height="16" fill="#6366f1"/>
  <text x="140" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">analysis_runs</text>
  <!-- Fields -->
  <line x1="30" y1="84" x2="250" y2="84" stroke="#e0e7ff" stroke-width="1"/>
  <text x="42" y="100" font-size="10" fill="#4338ca" font-weight="700">🔑 id</text>
  <text x="240" y="100" text-anchor="end" font-size="9" fill="#6b7280">UUID  PK</text>
  <line x1="30" y1="107" x2="250" y2="107" stroke="#f0f0ff" stroke-width="1"/>
  <text x="42" y="123" font-size="10" fill="#374151">run_date</text>
  <text x="240" y="123" text-anchor="end" font-size="9" fill="#6b7280">TIMESTAMPTZ</text>
  <line x1="30" y1="130" x2="250" y2="130" stroke="#f0f0ff" stroke-width="1"/>
  <text x="42" y="146" font-size="10" fill="#374151">region</text>
  <text x="240" y="146" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR  kr|global|all</text>
  <line x1="30" y1="153" x2="250" y2="153" stroke="#f0f0ff" stroke-width="1"/>
  <text x="42" y="169" font-size="10" fill="#374151">period_days</text>
  <text x="240" y="169" text-anchor="end" font-size="9" fill="#6b7280">INT</text>
  <line x1="30" y1="176" x2="250" y2="176" stroke="#f0f0ff" stroke-width="1"/>
  <text x="42" y="192" font-size="10" fill="#374151">video_count</text>
  <text x="240" y="192" text-anchor="end" font-size="9" fill="#6b7280">INT</text>
  <line x1="30" y1="199" x2="250" y2="199" stroke="#f0f0ff" stroke-width="1"/>
  <text x="42" y="215" font-size="10" fill="#374151">status</text>
  <text x="240" y="215" text-anchor="end" font-size="9" fill="#6b7280">ENUM  running|completed|failed</text>
  <line x1="30" y1="222" x2="250" y2="222" stroke="#f0f0ff" stroke-width="1"/>
  <text x="140" y="250" text-anchor="middle" font-size="9" fill="#818cf8" font-style="italic">idx: region, run_date DESC</text>

  <!-- ══════════ keywords ══════════ -->
  <rect x="300" y="50" width="220" height="230" rx="8" fill="white" stroke="#22c55e" stroke-width="2"/>
  <rect x="300" y="50"  width="220" height="34" rx="8" fill="#22c55e"/>
  <rect x="300" y="68"  width="220" height="16" fill="#22c55e"/>
  <text x="410" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">keywords</text>
  <line x1="300" y1="84" x2="520" y2="84" stroke="#dcfce7" stroke-width="1"/>
  <text x="312" y="100" font-size="10" fill="#15803d" font-weight="700">🔑 id</text>
  <text x="510" y="100" text-anchor="end" font-size="9" fill="#6b7280">UUID  PK</text>
  <line x1="300" y1="107" x2="520" y2="107" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="123" font-size="10" fill="#374151" font-weight="600">🔗 run_id</text>
  <text x="510" y="123" text-anchor="end" font-size="9" fill="#6b7280">UUID  FK</text>
  <line x1="300" y1="130" x2="520" y2="130" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="146" font-size="10" fill="#374151">keyword</text>
  <text x="510" y="146" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR</text>
  <line x1="300" y1="153" x2="520" y2="153" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="169" font-size="10" fill="#374151">count</text>
  <text x="510" y="169" text-anchor="end" font-size="9" fill="#6b7280">INT</text>
  <line x1="300" y1="176" x2="520" y2="176" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="192" font-size="10" fill="#374151">rank</text>
  <text x="510" y="192" text-anchor="end" font-size="9" fill="#6b7280">INT</text>
  <line x1="300" y1="199" x2="520" y2="199" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="215" font-size="10" fill="#374151">category</text>
  <text x="510" y="215" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR</text>
  <line x1="300" y1="222" x2="520" y2="222" stroke="#f0fff4" stroke-width="1"/>
  <text x="312" y="238" font-size="10" fill="#374151">language</text>
  <text x="510" y="238" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR  ko|en</text>
  <line x1="300" y1="245" x2="520" y2="245" stroke="#f0fff4" stroke-width="1"/>
  <text x="410" y="270" text-anchor="middle" font-size="9" fill="#4ade80" font-style="italic">idx: run_id, keyword, rank</text>

  <!-- ══════════ videos ══════════ -->
  <rect x="570" y="50" width="220" height="270" rx="8" fill="white" stroke="#f97316" stroke-width="2"/>
  <rect x="570" y="50"  width="220" height="34" rx="8" fill="#f97316"/>
  <rect x="570" y="68"  width="220" height="16" fill="#f97316"/>
  <text x="680" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="white">videos</text>
  <line x1="570" y1="84" x2="790" y2="84" stroke="#ffedd5" stroke-width="1"/>
  <text x="582" y="100" font-size="10" fill="#c2410c" font-weight="700">🔑 id</text>
  <text x="780" y="100" text-anchor="end" font-size="9" fill="#6b7280">UUID  PK</text>
  <line x1="570" y1="107" x2="790" y2="107" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="123" font-size="10" fill="#374151" font-weight="600">🔗 run_id</text>
  <text x="780" y="123" text-anchor="end" font-size="9" fill="#6b7280">UUID  FK</text>
  <line x1="570" y1="130" x2="790" y2="130" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="146" font-size="10" fill="#374151">video_id</text>
  <text x="780" y="146" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR</text>
  <line x1="570" y1="153" x2="790" y2="153" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="169" font-size="10" fill="#374151">title</text>
  <text x="780" y="169" text-anchor="end" font-size="9" fill="#6b7280">TEXT</text>
  <line x1="570" y1="176" x2="790" y2="176" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="192" font-size="10" fill="#374151">channel</text>
  <text x="780" y="192" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR</text>
  <line x1="570" y1="199" x2="790" y2="199" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="215" font-size="10" fill="#374151">views</text>
  <text x="780" y="215" text-anchor="end" font-size="9" fill="#6b7280">BIGINT</text>
  <line x1="570" y1="222" x2="790" y2="222" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="238" font-size="10" fill="#374151">likes</text>
  <text x="780" y="238" text-anchor="end" font-size="9" fill="#6b7280">BIGINT</text>
  <line x1="570" y1="245" x2="790" y2="245" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="261" font-size="10" fill="#374151">published_at</text>
  <text x="780" y="261" text-anchor="end" font-size="9" fill="#6b7280">TIMESTAMPTZ</text>
  <line x1="570" y1="268" x2="790" y2="268" stroke="#fff7ed" stroke-width="1"/>
  <text x="582" y="284" font-size="10" fill="#374151">language</text>
  <text x="780" y="284" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR  ko|en</text>
  <line x1="570" y1="291" x2="790" y2="291" stroke="#fff7ed" stroke-width="1"/>
  <text x="680" y="315" text-anchor="middle" font-size="9" fill="#fb923c" font-style="italic">idx: run_id, views DESC</text>

  <!-- ══════════ trend_snapshots ══════════ -->
  <rect x="30" y="350" width="220" height="105" rx="8" fill="white" stroke="#a855f7" stroke-width="2"/>
  <rect x="30" y="350" width="220" height="34" rx="8" fill="#a855f7"/>
  <rect x="30" y="368"  width="220" height="16" fill="#a855f7"/>
  <text x="140" y="372" text-anchor="middle" font-size="12" font-weight="700" fill="white">trend_snapshots</text>
  <line x1="30" y1="384" x2="250" y2="384" stroke="#f3e8ff" stroke-width="1"/>
  <text x="42" y="400" font-size="10" fill="#374151">snapshot_date</text>
  <text x="240" y="400" text-anchor="end" font-size="9" fill="#6b7280">DATE</text>
  <line x1="30" y1="407" x2="250" y2="407" stroke="#f3e8ff" stroke-width="1"/>
  <text x="42" y="423" font-size="10" fill="#374151">keyword  ·  rank  ·  count</text>
  <text x="240" y="423" text-anchor="end" font-size="9" fill="#6b7280">VARCHAR · INT</text>
  <line x1="30" y1="430" x2="250" y2="430" stroke="#f3e8ff" stroke-width="1"/>
  <text x="42" y="446" font-size="10" fill="#374151">rank_change  ·  is_new</text>
  <text x="240" y="446" text-anchor="end" font-size="9" fill="#6b7280">INT · BOOL</text>

  <!-- Relationship lines: analysis_runs → keywords -->
  <line x1="250" y1="107" x2="300" y2="107" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#pk-arr)"/>
  <text x="275" y="102" text-anchor="middle" font-size="8" fill="#6b7280">1</text>
  <text x="275" y="118" text-anchor="middle" font-size="8" fill="#6b7280">N</text>

  <!-- Relationship lines: analysis_runs → videos -->
  <line x1="250" y1="130" x2="570" y2="130" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#pk-arr)"/>
  <text x="390" y="124" text-anchor="middle" font-size="8" fill="#6b7280">1</text>
  <text x="410" y="139" text-anchor="middle" font-size="8" fill="#6b7280">N (max 20 per run)</text>

  <!-- Legend -->
  <rect x="310" y="390" width="480" height="72" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <text x="550" y="408" text-anchor="middle" font-size="10" font-weight="700" fill="#374151">관계도 범례</text>
  <text x="330" y="426" font-size="9" fill="#374151">🔑 PK — Primary Key</text>
  <text x="330" y="442" font-size="9" fill="#374151">🔗 FK — Foreign Key → analysis_runs.id</text>
  <text x="490" y="426" font-size="9" fill="#374151">─ ─ ─ ▶  1 : N 관계 (One-to-Many)</text>
  <text x="490" y="442" font-size="9" fill="#374151">trend_snapshots: 독립 집계 테이블 (FK 없음)</text>
  <text x="330" y="454" font-size="9" fill="#374151">keywords, videos: run_id로 analysis_runs에 연결</text>
</svg>
